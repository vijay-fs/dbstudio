# Build Bearhold Studio installers for macOS and Windows. Triggered
# manually via the Actions tab ("Run workflow") or by pushing a tag
# that starts with `v` (e.g. `v0.1.0`).
#
# Auto-updater: enabled the moment two pieces are in place:
#   1. `TAURI_SIGNING_PRIVATE_KEY` exists as a GitHub Actions secret
#   2. `apps/desktop/src-tauri/tauri.conf.json` sets
#      plugins.updater.active=true and a real `pubkey` + endpoints
# Until then the workflow ships plain dmg/msi/nsis bundles only; the
# `release` job won't try to upload `.sig` files that weren't built.
#
# Code-signing (separate from updater signing): Apple Developer ID +
# Windows OV/EV certs aren't wired yet, so first launch still
# triggers Gatekeeper / SmartScreen warnings. Updater signing is
# independent and works without those certs.

name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  macos:
    name: macOS (aarch64)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri -> ../../target
      - name: Install JS deps
        run: pnpm install --frozen-lockfile
      - name: Detect updater config
        id: updater
        shell: bash
        run: |
          # The updater bundle target requires the signing private
          # key. Building it without one fails the whole job, so we
          # opt in only when both the config flag and the secret are
          # present.
          if [ -n "${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}" ] && \
             grep -q '"active": true' apps/desktop/src-tauri/tauri.conf.json; then
            echo "bundles=dmg,app,updater" >> "$GITHUB_OUTPUT"
            echo "updater=true" >> "$GITHUB_OUTPUT"
          else
            echo "bundles=dmg,app" >> "$GITHUB_OUTPUT"
            echo "updater=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Build app
        working-directory: apps/desktop
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: pnpm tauri build --bundles ${{ steps.updater.outputs.bundles }}
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-aarch64
          # Globs that don't match are warned about, not errored —
          # so the updater-related entries are safe to keep even
          # when updater=false.
          if-no-files-found: ignore
          path: |
            target/release/bundle/dmg/*.dmg
            target/release/bundle/macos/*.app
            target/release/bundle/macos/*.app.tar.gz
            target/release/bundle/macos/*.app.tar.gz.sig

  windows:
    name: Windows (x86_64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri -> ../../target
      - name: Install JS deps
        run: pnpm install --frozen-lockfile
      - name: Detect updater config
        id: updater
        shell: bash
        run: |
          if [ -n "${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}" ] && \
             grep -q '"active": true' apps/desktop/src-tauri/tauri.conf.json; then
            echo "bundles=nsis,msi,updater" >> "$GITHUB_OUTPUT"
            echo "updater=true" >> "$GITHUB_OUTPUT"
          else
            echo "bundles=nsis,msi" >> "$GITHUB_OUTPUT"
            echo "updater=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Build app
        working-directory: apps/desktop
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: pnpm tauri build --bundles ${{ steps.updater.outputs.bundles }}
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-x86_64
          if-no-files-found: ignore
          path: |
            target/release/bundle/nsis/*.exe
            target/release/bundle/nsis/*.nsis.zip
            target/release/bundle/nsis/*.nsis.zip.sig
            target/release/bundle/msi/*.msi

  release:
    name: Publish release (+ updater manifest when keys are set)
    needs: [macos, windows]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-aarch64
          path: artifacts/macos
      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-x86_64
          path: artifacts/windows
      - name: Build latest.json updater manifest (if signed)
        id: manifest
        shell: bash
        run: |
          # Only emit the manifest when both `.sig` files are present.
          # Mixed states (one OS signed, one not) would publish a
          # half-broken manifest; rather emit nothing and let the
          # release ship without auto-update for that round.
          if [ -f artifacts/macos/*.app.tar.gz.sig ] && \
             [ -f artifacts/windows/*.nsis.zip.sig ]; then
            set -euo pipefail
            VERSION="${GITHUB_REF_NAME#v}"
            PUB_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            REPO="${GITHUB_REPOSITORY}"
            MAC_ARCHIVE="$(basename artifacts/macos/*.app.tar.gz)"
            MAC_SIG="$(cat artifacts/macos/*.app.tar.gz.sig)"
            WIN_ARCHIVE="$(basename artifacts/windows/*.nsis.zip)"
            WIN_SIG="$(cat artifacts/windows/*.nsis.zip.sig)"
            cat > latest.json <<JSON
          {
            "version": "${VERSION}",
            "notes": "See the release page for details.",
            "pub_date": "${PUB_DATE}",
            "platforms": {
              "darwin-aarch64": {
                "signature": "${MAC_SIG}",
                "url": "https://github.com/${REPO}/releases/download/${GITHUB_REF_NAME}/${MAC_ARCHIVE}"
              },
              "windows-x86_64": {
                "signature": "${WIN_SIG}",
                "url": "https://github.com/${REPO}/releases/download/${GITHUB_REF_NAME}/${WIN_ARCHIVE}"
              }
            }
          }
          JSON
            echo "wrote=true" >> "$GITHUB_OUTPUT"
          else
            echo "Skipping latest.json — updater secrets not configured."
            echo "wrote=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Create release + attach artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/macos/*.dmg
            artifacts/macos/*.app.tar.gz
            artifacts/macos/*.app.tar.gz.sig
            artifacts/windows/*.exe
            artifacts/windows/*.msi
            artifacts/windows/*.nsis.zip
            artifacts/windows/*.nsis.zip.sig
            latest.json
          fail_on_unmatched_files: false
          generate_release_notes: true
